- hosts: web
  become: yes
  tasks:
    - apt:
        name: nginx
        state: present
        update_cache: yes

    - service:
        name: nginx
        state: started
        enabled: yes

    - copy:
        dest: /var/www/html/index.html
        content: |
          <html>
          <head>
            <title>nginx demo</title>
          </head>
          <body>
            <h1>nginx works</h1>
            <p>Deployed with Ansible</p>
          </body>
          </html>